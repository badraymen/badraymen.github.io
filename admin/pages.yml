media_folder: "image"
public_folder: "/image"

collections:
  - name: "pages"
    label: "Site Pages"
    files:
      - label: "Home Page"
        name: "index"
        file: "index.html"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "string"}
          - {label: "Contact Text", name: "contact_text", widget: "text"}
      - label: "Commercial Page"
        name: "commercial"
        file: "commercial.html"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro Text", name: "intro_text", widget: "text"}
      - label: "Artistic Page"
        name: "artistic"
        file: "artistic.html"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro Text", name: "intro_text", widget: "text"}
      - label: "Bespoke Page"
        name: "bespoke"
        file: "bespoke.html"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro Text", name: "intro_text", widget: "text"}